name: Build SCMS

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install g++
        run: g++ --version

      - name: Compile
        run: |
          g++ -std=c++17 -Wall -Wextra \
            src/person/*.cpp src/course/*.cpp src/library/*.cpp \
            src/finance/*.cpp src/hostel/*.cpp src/utils/*.cpp \
            src/main.cpp -o scms

      - name: Smoke Test
        run: echo "7" | ./scms
